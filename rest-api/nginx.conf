server {
    listen 80;
    server_name _;

    root /var/www/calvin;
    index index.php;

    location = /influx.php {
        fastcgi_pass  unix:/run/php/php-fpm.sock;
        fastcgi_index influx.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Only accept reasonable body sizes (line protocol batches)
        client_max_body_size 4m;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
